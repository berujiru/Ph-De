<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Security Guard: detailed batuta (police baton) swung from the pivot at x=0; rounded
       tip reaches the far edge so sprite length == cleave range. Anime crescent slash +
       speed lines layered behind the weapon (light/glow only, no dark outline on the slash). -->
  <defs>
    <radialGradient id="batuta-slash" gradientUnits="userSpaceOnUse" cx="40" cy="256" r="470">
      <stop offset="0.55" stop-color="#999999" stop-opacity="0"/>
      <stop offset="0.8" stop-color="#cccccc" stop-opacity="0.35"/>
      <stop offset="0.93" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="batuta-shaft" gradientUnits="userSpaceOnUse" x1="0" y1="226" x2="0" y2="286">
      <stop offset="0" stop-color="#f2f2f2"/>
      <stop offset="0.45" stop-color="#cccccc"/>
      <stop offset="1" stop-color="#666666"/>
    </linearGradient>
    <linearGradient id="batuta-grip" gradientUnits="userSpaceOnUse" x1="0" y1="232" x2="0" y2="288">
      <stop offset="0" stop-color="#a6a6a6"/>
      <stop offset="0.5" stop-color="#737373"/>
      <stop offset="1" stop-color="#4d4d4d"/>
    </linearGradient>
    <radialGradient id="batuta-tip" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#d9d9d9"/>
      <stop offset="1" stop-color="#8c8c8c"/>
    </radialGradient>
  </defs>

  <!-- anime slash crescent: bright leading edge, feathered trailing edge -->
  <path d="M 36 20 C 320 60, 496 150, 496 256 C 496 362, 320 452, 36 492
           C 240 430, 380 340, 380 256 C 380 172, 240 82, 36 20 Z"
        fill="url(#batuta-slash)"/>
  <!-- concentric speed lines, hand-drawn anime feel -->
  <path d="M 70 110 Q 800 256 70 402" fill="none" stroke="#ffffff" stroke-width="7"
        stroke-opacity="0.85" stroke-linecap="round"/>
  <path d="M 90 160 Q 640 256 90 352" fill="none" stroke="#e6e6e6" stroke-width="5"
        stroke-opacity="0.6" stroke-linecap="round" stroke-dasharray="42 28"/>
  <path d="M 110 205 Q 500 256 110 307" fill="none" stroke="#cccccc" stroke-width="4"
        stroke-opacity="0.5" stroke-linecap="round" stroke-dasharray="24 34"/>

  <!-- wrist-strap loop at the grip end -->
  <path d="M 34 288 C 10 320, 12 352, 40 350 C 62 348, 58 314, 46 294"
        fill="none" stroke="#0f172a" stroke-width="18" stroke-linecap="round"/>
  <path d="M 34 288 C 10 320, 12 352, 40 350 C 62 348, 58 314, 46 294"
        fill="none" stroke="#737373" stroke-width="8" stroke-linecap="round"/>

  <!-- ribbed rubber grip -->
  <rect x="8" y="232" width="100" height="56" rx="24" fill="url(#batuta-grip)"
        stroke="#0f172a" stroke-width="12"/>
  <rect x="26" y="240" width="8" height="40" rx="4" fill="#4d4d4d"/>
  <rect x="46" y="240" width="8" height="40" rx="4" fill="#4d4d4d"/>
  <rect x="66" y="240" width="8" height="40" rx="4" fill="#4d4d4d"/>
  <rect x="86" y="240" width="8" height="40" rx="4" fill="#4d4d4d"/>
  <!-- grip top-edge sheen -->
  <rect x="20" y="238" width="76" height="6" rx="3" fill="#cccccc" fill-opacity="0.7"/>

  <!-- ferrule collar between grip and shaft -->
  <rect x="102" y="226" width="22" height="60" rx="7" fill="#d9d9d9"
        stroke="#0f172a" stroke-width="10"/>

  <!-- shaft: cylindrical shading, light top edge to dark underside -->
  <rect x="118" y="228" width="356" height="56" rx="26" fill="url(#batuta-shaft)"
        stroke="#0f172a" stroke-width="14"/>
  <!-- long specular streak along the shaft -->
  <rect x="140" y="238" width="310" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.9"/>
  <!-- subtle wear marks -->
  <path d="M 210 272 l 24 -4" fill="none" stroke="#999999" stroke-width="4" stroke-linecap="round"/>
  <path d="M 330 248 l 20 6" fill="none" stroke="#8c8c8c" stroke-width="4" stroke-linecap="round"/>

  <!-- rounded tip at the far edge with radial highlight -->
  <circle cx="468" cy="256" r="34" fill="url(#batuta-tip)" stroke="#0f172a" stroke-width="12"/>
</svg>
