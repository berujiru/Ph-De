<svg xmlns="http://www.w3.org/2000/svg" width="512" height="540" viewBox="0 0 512 540" preserveAspectRatio="none">
  <!--
    Parallax layer 0 (farthest): night-rally sky. Pure vertical gradients only,
    so any horizontal slice is identical and the TileSprite repeats seamlessly.
    Palette per docs/ART_AND_AUDIO_GUIDELINES.md (#0f172a slate, #38bdf8 accent).
  -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0a0f1e"/>
      <stop offset="0.6"  stop-color="#0f172a"/>
      <stop offset="1"    stop-color="#16233d"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.7"  stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="1"    stop-color="#facc15" stop-opacity="0.10"/>
    </linearGradient>
  </defs>
  <rect width="512" height="540" fill="url(#sky)"/>
  <rect y="300" width="512" height="240" fill="url(#horizon)"/>
</svg>
