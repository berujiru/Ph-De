<svg xmlns="http://www.w3.org/2000/svg" width="512" height="540" viewBox="0 0 512 540">
  <!--
    Parallax layer 1: distant city skyline silhouette. Buildings sit inside the
    tile with empty sky gutters at x=0 and x=512, so the TileSprite repeats with
    no torn geometry. Dark slate blocks with a scatter of warm gold windows.
  -->
  <g fill="#0c1424">
    <rect x="40"  y="300" width="60"  height="120"/>
    <rect x="112" y="260" width="46"  height="160"/>
    <rect x="170" y="320" width="74"  height="100"/>
    <rect x="258" y="240" width="40"  height="180"/>
    <rect x="310" y="300" width="66"  height="120"/>
    <rect x="388" y="278" width="52"  height="142"/>
    <rect x="452" y="330" width="34"  height="90"/>
  </g>
  <!-- antennas / spires -->
  <g stroke="#0c1424" stroke-width="3">
    <path d="M135 260V236"/>
    <path d="M278 240V210"/>
    <path d="M414 278V254"/>
  </g>
  <path d="M278 214l7 4-7 4z" fill="#38bdf8" opacity="0.5"/>
  <!-- warm lit windows -->
  <g fill="#facc15" opacity="0.18">
    <rect x="52"  y="316" width="10" height="12"/><rect x="72"  y="316" width="10" height="12"/>
    <rect x="124" y="288" width="9"  height="12"/><rect x="140" y="320" width="9"  height="12"/>
    <rect x="186" y="340" width="10" height="12"/><rect x="212" y="340" width="10" height="12"/>
    <rect x="268" y="270" width="9"  height="12"/><rect x="268" y="300" width="9"  height="12"/>
    <rect x="324" y="322" width="10" height="12"/><rect x="348" y="322" width="10" height="12"/>
    <rect x="400" y="302" width="9"  height="12"/><rect x="420" y="330" width="9"  height="12"/>
  </g>
</svg>
