<svg xmlns="http://www.w3.org/2000/svg" width="512" height="540" viewBox="0 0 512 540">
  
      <!-- Left side houses/roofs -->
      <g fill="#0c1424">
        <rect x="20" y="320" width="80" height="100"/>
        <polygon points="10,320 60,280 110,320" />
        <rect x="120" y="350" width="40" height="70"/>
        <polygon points="115,350 140,320 165,350" />
      </g>
      <!-- Right side houses/roofs -->
      <g fill="#0c1424">
        <rect x="360" y="310" width="70" height="110"/>
        <polygon points="350,310 395,270 440,310" />
        <rect x="450" y="340" width="50" height="80"/>
        <polygon points="440,340 475,300 510,340" />
      </g>
      <!-- Wires -->
      <path d="M100 280 Q 256 340 395 270" stroke="#0c1424" stroke-width="2" fill="none" opacity="0.6"/>
      <!-- Windows -->
      <g fill="#facc15" opacity="0.2">
        <rect x="40" y="350" width="15" height="20" />
        <rect x="70" y="350" width="15" height="20" />
        <rect x="380" y="340" width="15" height="20" />
        <rect x="400" y="340" width="15" height="20" />
      </g>
    
</svg>