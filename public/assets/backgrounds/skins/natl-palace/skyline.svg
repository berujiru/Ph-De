<svg xmlns="http://www.w3.org/2000/svg" width="512" height="540" viewBox="0 0 512 540">
  
      <g fill="#0c1424">
        <!-- Skyscrapers -->
        <rect x="20" y="180" width="60" height="240" />
        <rect x="90" y="220" width="50" height="200" />
        <rect x="350" y="150" width="70" height="270" />
        <rect x="430" y="200" width="60" height="220" />
      </g>
      <!-- Elevated Rail -->
      <g fill="#0c1424">
        <rect x="-10" y="300" width="180" height="15" />
        <rect x="40" y="315" width="20" height="105" />
        <rect x="120" y="315" width="20" height="105" />
      </g>
      <!-- Windows -->
      <g fill="#facc15" opacity="0.2">
        <!-- Tower 1 -->
        <rect x="30" y="200" width="10" height="15" /><rect x="50" y="200" width="10" height="15" />
        <rect x="30" y="230" width="10" height="15" /><rect x="50" y="230" width="10" height="15" />
        <rect x="30" y="260" width="10" height="15" /><rect x="50" y="260" width="10" height="15" />
        <rect x="30" y="290" width="10" height="15" /><rect x="50" y="290" width="10" height="15" />
        <!-- Tower 3 -->
        <rect x="360" y="170" width="15" height="15" /><rect x="390" y="170" width="15" height="15" />
        <rect x="360" y="200" width="15" height="15" /><rect x="390" y="200" width="15" height="15" />
        <rect x="360" y="230" width="15" height="15" /><rect x="390" y="230" width="15" height="15" />
        <rect x="360" y="260" width="15" height="15" /><rect x="390" y="260" width="15" height="15" />
      </g>
    
</svg>