<svg xmlns="http://www.w3.org/2000/svg" width="512" height="160" viewBox="0 0 512 160">
  <!-- Construction Worker skill "Barrier": lane-spanning DIY protest barricade —
       overlapping corrugated yero sheets braced by wooden struts, sandbags/concrete
       at the feet, caution tape on top, amber accents. Skill FX: bespoke BAKED colors,
       never tinted. Seen front-top (oblique camera), feet at the bottom edge. -->
  <defs>
    <pattern id="yero-ribs" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="5" height="16" fill="#6b7a87" fill-opacity="0.55"/>
      <rect x="8" y="0" width="3" height="16" fill="#c8d2da" fill-opacity="0.7"/>
    </pattern>
    <clipPath id="tape-clip">
      <path d="M 0 18 C 120 30, 260 8, 512 22 L 512 44 C 260 30, 120 52, 0 40 Z"/>
    </clipPath>
  </defs>

  <!-- ===== corrugated yero sheets (back layer), each slightly askew ===== -->
  <!-- sheet A -->
  <g transform="rotate(-2 60 100)">
    <polygon points="2,38 118,38 124,28 8,28" fill="#cfd8e0" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
    <rect x="2" y="38" width="116" height="128" fill="#8a9aa8"/>
    <rect x="2" y="38" width="116" height="128" fill="url(#yero-ribs)"/>
    <rect x="2" y="138" width="116" height="28" fill="#6b7a87" fill-opacity="0.6"/>
    <rect x="2" y="38" width="116" height="128" fill="none" stroke="#0f172a" stroke-width="5"/>
    <!-- amber DIY sign -->
    <rect x="26" y="64" width="56" height="42" fill="#d97706" stroke="#0f172a" stroke-width="5"/>
    <rect x="33" y="71" width="42" height="28" fill="none" stroke="#b45309" stroke-width="4"/>
    <path d="M 54 76 v 12" fill="none" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <circle cx="54" cy="95" r="3.5" fill="#0f172a"/>
  </g>
  <!-- sheet B -->
  <g transform="rotate(1.5 165 96)">
    <polygon points="102,26 228,26 234,16 108,16" fill="#cfd8e0" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
    <rect x="102" y="26" width="126" height="140" fill="#93a3b1"/>
    <rect x="102" y="26" width="126" height="140" fill="url(#yero-ribs)"/>
    <rect x="102" y="136" width="126" height="30" fill="#6b7a87" fill-opacity="0.6"/>
    <polygon points="112,34 138,34 122,120 108,120" fill="#c8d2da" fill-opacity="0.45"/>
    <rect x="102" y="26" width="126" height="140" fill="none" stroke="#0f172a" stroke-width="5"/>
  </g>
  <!-- sheet C -->
  <g transform="rotate(-1 271 103)">
    <polygon points="212,40 330,40 336,30 218,30" fill="#cfd8e0" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
    <rect x="212" y="40" width="118" height="126" fill="#8a9aa8"/>
    <rect x="212" y="40" width="118" height="126" fill="url(#yero-ribs)"/>
    <rect x="212" y="138" width="118" height="28" fill="#6b7a87" fill-opacity="0.6"/>
    <rect x="212" y="40" width="118" height="126" fill="none" stroke="#0f172a" stroke-width="5"/>
    <!-- painted amber hazard chevrons -->
    <path d="M 236 66 l 26 30 l -26 30 h 15 l 26 -30 l -26 -30 Z" fill="#d97706" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
    <path d="M 272 66 l 26 30 l -26 30 h 15 l 26 -30 l -26 -30 Z" fill="#d97706" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
  </g>
  <!-- sheet D -->
  <g transform="rotate(2 375 97)">
    <polygon points="314,28 436,28 442,18 320,18" fill="#cfd8e0" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
    <rect x="314" y="28" width="122" height="138" fill="#93a3b1"/>
    <rect x="314" y="28" width="122" height="138" fill="url(#yero-ribs)"/>
    <rect x="314" y="136" width="122" height="30" fill="#6b7a87" fill-opacity="0.6"/>
    <polygon points="326,36 352,36 336,118 322,118" fill="#c8d2da" fill-opacity="0.45"/>
    <rect x="314" y="28" width="122" height="138" fill="none" stroke="#0f172a" stroke-width="5"/>
  </g>
  <!-- sheet E -->
  <g transform="rotate(-1.5 465 104)">
    <polygon points="420,42 510,42 512,32 426,32" fill="#cfd8e0" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
    <rect x="420" y="42" width="90" height="124" fill="#8a9aa8"/>
    <rect x="420" y="42" width="90" height="124" fill="url(#yero-ribs)"/>
    <rect x="420" y="138" width="90" height="28" fill="#6b7a87" fill-opacity="0.6"/>
    <rect x="420" y="42" width="90" height="124" fill="none" stroke="#0f172a" stroke-width="5"/>
  </g>

  <!-- ===== wooden bracing ===== -->
  <!-- horizontal wale plank -->
  <rect x="48" y="84" width="416" height="20" fill="#7c4a21" stroke="#0f172a" stroke-width="5"/>
  <rect x="56" y="88" width="400" height="5" fill="#a06a38"/>
  <!-- diagonal struts -->
  <path d="M 24 152 L 210 44 L 226 54 L 40 160 Z" fill="#7c4a21" stroke="#0f172a" stroke-width="5" stroke-linejoin="round"/>
  <path d="M 32 146 L 208 52" fill="none" stroke="#a06a38" stroke-width="5" stroke-linecap="round"/>
  <path d="M 488 152 L 302 44 L 286 54 L 472 160 Z" fill="#7c4a21" stroke="#0f172a" stroke-width="5" stroke-linejoin="round"/>
  <path d="M 480 146 L 304 52" fill="none" stroke="#a06a38" stroke-width="5" stroke-linecap="round"/>

  <!-- ===== caution tape across the top ===== -->
  <path d="M 0 18 C 120 30, 260 8, 512 22 L 512 44 C 260 30, 120 52, 0 40 Z"
        fill="#facc15" stroke="#0f172a" stroke-width="4"/>
  <g clip-path="url(#tape-clip)">
    <path d="M 6 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 42 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 78 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 114 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 150 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 186 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 222 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 258 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 294 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 330 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 366 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 402 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 438 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
    <path d="M 474 52 l 18 -42 h 14 l -18 42 Z" fill="#0f172a"/>
  </g>

  <!-- ===== feet: sandbags and a concrete block ===== -->
  <g>
    <rect x="14" y="126" width="78" height="34" rx="16" fill="#b09a72" stroke="#0f172a" stroke-width="5"/>
    <path d="M 30 132 q 24 -6 48 0" fill="none" stroke="#c9b68f" stroke-width="5" stroke-linecap="round"/>
    <path d="M 52 138 v 14" fill="none" stroke="#0f172a" stroke-width="3"/>
    <rect x="56" y="132" width="76" height="30" rx="14" fill="#a8926b" stroke="#0f172a" stroke-width="5"/>
    <path d="M 72 138 q 22 -5 44 0" fill="none" stroke="#c9b68f" stroke-width="4" stroke-linecap="round"/>
  </g>
  <rect x="222" y="116" width="88" height="44" fill="#a7aeb6" stroke="#0f172a" stroke-width="5"/>
  <rect x="228" y="120" width="76" height="6" fill="#c8d2da"/>
  <rect x="238" y="130" width="18" height="24" fill="#6d7680" stroke="#0f172a" stroke-width="4"/>
  <rect x="276" y="130" width="18" height="24" fill="#6d7680" stroke="#0f172a" stroke-width="4"/>
  <g>
    <rect x="396" y="126" width="80" height="34" rx="16" fill="#b09a72" stroke="#0f172a" stroke-width="5"/>
    <path d="M 412 132 q 24 -6 48 0" fill="none" stroke="#c9b68f" stroke-width="5" stroke-linecap="round"/>
    <path d="M 436 138 v 14" fill="none" stroke="#0f172a" stroke-width="3"/>
    <rect x="438" y="132" width="72" height="28" rx="13" fill="#a8926b" stroke="#0f172a" stroke-width="5"/>
    <path d="M 452 138 q 20 -5 40 0" fill="none" stroke="#c9b68f" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
