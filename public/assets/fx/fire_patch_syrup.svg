<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="syrup-body" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#92400e" />
      <stop offset="45%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="syrup-core" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="55%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#fffbeb" />
    </linearGradient>
    <radialGradient id="syrup-seam" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="45%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#92400e" stop-opacity="0" />
    </radialGradient>
    <filter id="syrup-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing syrup seam -->
  <ellipse cx="100" cy="248" rx="95" ry="15" fill="url(#syrup-seam)" opacity="0.55" filter="url(#syrup-glow)" />

  <!-- Outer licks -->
  <path d="M 14 252 C 11 232 20 218 21 200 C 22 190 26 195 28 185 C 30 195 34 190 35 200 C 36 218 45 232 42 252 Z" fill="url(#syrup-body)" opacity="0.85" filter="url(#syrup-glow)" />
  <path d="M 158 252 C 155 232 164 218 165 200 C 166 190 170 195 172 185 C 174 195 178 190 179 200 C 180 218 189 232 186 252 Z" fill="url(#syrup-body)" opacity="0.85" filter="url(#syrup-glow)" />

  <!-- Mid flames -->
  <path d="M 36 252 C 32 220 44 200 43 176 C 42 150 52 136 58 110 C 64 136 74 150 73 176 C 72 200 84 220 80 252 Z" fill="url(#syrup-body)" filter="url(#syrup-glow)" />
  <path d="M 120 252 C 116 220 128 200 127 176 C 126 150 136 136 142 110 C 148 136 158 150 157 176 C 156 200 168 220 164 252 Z" fill="url(#syrup-body)" filter="url(#syrup-glow)" />

  <!-- Center tongue -->
  <path d="M 72 252 C 66 210 84 190 82 150 C 80 120 92 96 100 25 C 108 96 120 120 118 150 C 116 190 134 210 128 252 Z" fill="url(#syrup-body)" filter="url(#syrup-glow)" />

  <!-- Pale cores -->
  <path d="M 47 250 C 44 222 53 205 52 182 C 51 158 58 144 58 122 C 58 144 65 158 64 182 C 63 205 72 222 69 250 Z" fill="url(#syrup-core)" opacity="0.9" />
  <path d="M 131 250 C 128 222 137 205 136 182 C 135 158 142 144 142 122 C 142 144 149 158 148 182 C 147 205 156 222 153 250 Z" fill="url(#syrup-core)" opacity="0.9" />
  <path d="M 84 250 C 80 215 94 196 93 158 C 92 128 99 108 100 52 C 101 108 108 128 107 158 C 106 196 120 215 116 250 Z" fill="url(#syrup-core)" opacity="0.92" />

  <!-- Pale steam wisps (syrup steams, doesn't smoke) -->
  <path d="M 100 30 C 108 18 96 10 104 2" fill="none" stroke="#fef3c7" stroke-width="5" stroke-linecap="round" opacity="0.35" />
  <path d="M 58 108 C 66 96 54 90 62 80" fill="none" stroke="#fef3c7" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  <path d="M 142 108 C 150 96 138 90 146 80" fill="none" stroke="#fef3c7" stroke-width="4" stroke-linecap="round" opacity="0.3" />

  <!-- Warm sparks -->
  <circle cx="70" cy="150" r="2.5" fill="#fffbeb" filter="url(#syrup-glow)" />
  <circle cx="128" cy="130" r="2" fill="#fbbf24" filter="url(#syrup-glow)" />
  <circle cx="100" cy="90" r="3" fill="#fef3c7" filter="url(#syrup-glow)" />
  <circle cx="52" cy="200" r="1.5" fill="#fbbf24" filter="url(#syrup-glow)" />
  <circle cx="150" cy="185" r="2" fill="#fffbeb" filter="url(#syrup-glow)" />

  <!-- Sticky syrup splash + drips at the base -->
  <path d="M 30 250 C 24 244 22 250 26 254 C 30 256 34 254 30 250 Z" fill="#d97706" opacity="0.6" />
  <path d="M 170 250 C 176 244 178 250 174 254 C 170 256 166 254 170 250 Z" fill="#d97706" opacity="0.6" />
  <path d="M 100 254 C 92 250 88 256 94 258 C 100 259 108 258 100 254 Z" fill="#d97706" opacity="0.55" />
  <circle cx="44" cy="252" r="3" fill="#f59e0b" opacity="0.75" />
  <circle cx="156" cy="253" r="2.5" fill="#f59e0b" opacity="0.75" />
</svg>
