<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="focus-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer broken reticle ring: four arcs with gaps at the tick marks -->
  <g fill="none" stroke="#facc15" stroke-width="7" stroke-linecap="round" filter="url(#focus-glow)">
    <path d="M 100 26 A 74 74 0 0 1 152 47" transform="rotate(11 100 100)" />
    <path d="M 100 26 A 74 74 0 0 1 152 47" transform="rotate(101 100 100)" />
    <path d="M 100 26 A 74 74 0 0 1 152 47" transform="rotate(191 100 100)" />
    <path d="M 100 26 A 74 74 0 0 1 152 47" transform="rotate(281 100 100)" />
  </g>

  <!-- Four tick marks pointing inward at the compass points -->
  <g stroke="#eab308" stroke-width="7" stroke-linecap="round" filter="url(#focus-glow)">
    <line x1="100" y1="14" x2="100" y2="40" />
    <line x1="100" y1="186" x2="100" y2="160" />
    <line x1="14" y1="100" x2="40" y2="100" />
    <line x1="186" y1="100" x2="160" y2="100" />
  </g>

  <!-- Inner thin ring framing the center -->
  <circle cx="100" cy="100" r="34" fill="none" stroke="#fef08a" stroke-width="3" opacity="0.8" />

  <!-- Center dot -->
  <circle cx="100" cy="100" r="10" fill="#facc15" stroke="#713f12" stroke-width="2.5" filter="url(#focus-glow)" />
</svg>
