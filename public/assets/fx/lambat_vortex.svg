<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Violet Vortex Gradients -->
    <radialGradient id="vortexGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.4" />
      <stop offset="40%" stop-color="#9333ea" stop-opacity="0.3" />
      <stop offset="80%" stop-color="#4c1d95" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#2e1065" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="vortexGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="30%" stop-color="#d946ef" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0" />
    </radialGradient>

    <!-- Net Pattern -->
    <pattern id="netPattern" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M 0 0 L 20 0 L 20 20 L 0 20 Z" fill="none" stroke="#d1d5db" stroke-width="2" />
      <!-- Knots -->
      <circle cx="0" cy="0" r="2" fill="#9ca3af" />
      <circle cx="20" cy="0" r="2" fill="#9ca3af" />
      <circle cx="0" cy="20" r="2" fill="#9ca3af" />
      <circle cx="20" cy="20" r="2" fill="#9ca3af" />
    </pattern>
  </defs>

  <!-- Vortex background -->
  <circle cx="100" cy="100" r="95" fill="url(#vortexGrad1)" />
  
  <!-- Swirl Paths -->
  <path d="M100 100 Q150 50 180 100 T100 180" fill="none" stroke="url(#vortexGrad2)" stroke-width="12" stroke-linecap="round" />
  <path d="M100 100 Q50 150 20 100 T100 20" fill="none" stroke="url(#vortexGrad2)" stroke-width="12" stroke-linecap="round" />
  <path d="M100 100 Q150 150 100 180 T20 100" fill="none" stroke="url(#vortexGrad2)" stroke-width="8" stroke-linecap="round" />
  <path d="M100 100 Q50 50 100 20 T180 100" fill="none" stroke="url(#vortexGrad2)" stroke-width="8" stroke-linecap="round" />

  <!-- The Lambat (Net) overlay -->
  <circle cx="100" cy="100" r="90" fill="url(#netPattern)" />
  
  <!-- Edge of the net (a thick rope) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#6b7280" stroke-width="6" stroke-dasharray="8 4" />
</svg>
