<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128" width="64" height="128">
  <defs>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a5568" stop-opacity="0.8" />
      <stop offset="30%" stop-color="#a0aec0" stop-opacity="0.6" />
      <stop offset="70%" stop-color="#e2e8f0" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#2d3748" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    <radialGradient id="flameGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="40%" stop-color="#f97316" />
      <stop offset="70%" stop-color="#dc2626" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Flame Glow -->
  <circle cx="32" cy="24" r="24" fill="url(#flameGlow)" opacity="0.8"/>

  <!-- Flame Core (Outer) -->
  <path d="M 32 4 C 40 20, 48 26, 42 36 C 38 42, 26 42, 22 36 C 16 26, 24 20, 32 4 Z" fill="#f97316"/>
  <!-- Flame Core (Inner) -->
  <path d="M 32 12 C 38 24, 42 28, 38 34 C 36 38, 28 38, 26 34 C 22 28, 26 24, 32 12 Z" fill="#fef08a"/>
  
  <!-- Burning Rag -->
  <path d="M 28 32 Q 22 40, 26 52 Q 28 56, 32 52 Q 36 44, 34 32 Z" fill="#9ca3af"/>
  <path d="M 29 34 Q 25 40, 28 48 Q 29 50, 31 48 Q 33 42, 32 34 Z" fill="#6b7280" opacity="0.5"/>

  <!-- Bottle Neck -->
  <rect x="26" y="48" width="12" height="24" fill="url(#glassGradient)" rx="2"/>
  <rect x="24" y="46" width="16" height="4" fill="#4a5568" rx="1"/>

  <!-- Bottle Body (Taho Glass) -->
  <path d="M 26 72 L 14 88 L 14 120 A 8 8 0 0 0 22 128 L 42 128 A 8 8 0 0 0 50 120 L 50 88 L 38 72 Z" fill="url(#glassGradient)"/>
  
  <!-- Hot Syrup Liquid Inside -->
  <path d="M 15 92 L 15 120 A 7 7 0 0 0 22 127 L 42 127 A 7 7 0 0 0 49 120 L 49 92 Q 32 88, 15 92 Z" fill="url(#liquidGradient)"/>

  <!-- Glass Highlights (Reflection) -->
  <path d="M 18 94 L 18 120 A 4 4 0 0 0 22 124 L 24 124 L 24 94 Z" fill="#ffffff" opacity="0.4"/>
  <rect x="28" y="52" width="2" height="16" fill="#ffffff" opacity="0.4"/>
  <path d="M 46 94 L 46 116 A 2 2 0 0 1 44 118 L 42 118 L 42 94 Z" fill="#ffffff" opacity="0.2"/>

  <!-- Label (Taho logo) -->
  <rect x="20" y="102" width="24" height="14" fill="#fde68a" rx="1"/>
  <rect x="22" y="104" width="20" height="10" fill="#f59e0b" rx="1"/>
  <text x="32" y="112" font-size="6" font-family="sans-serif" font-weight="bold" fill="#78350f" text-anchor="middle">TAHO</text>
</svg>
