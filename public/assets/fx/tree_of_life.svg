<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <defs>
    <linearGradient id="trunk-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    
    <radialGradient id="leaves-grad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="40%" stop-color="#eab308" />
      <stop offset="80%" stop-color="#ca8a04" />
      <stop offset="100%" stop-color="#854d0e" />
    </radialGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Aura / Back glow -->
  <circle cx="100" cy="100" r="85" fill="#fef08a" opacity="0.3" filter="url(#glow)" />
  <circle cx="100" cy="100" r="60" fill="#fde047" opacity="0.5" filter="url(#glow)" />

  <!-- Trunk base & roots -->
  <path d="M 85 220 C 80 235 60 245 40 240 C 65 240 75 230 85 220" fill="url(#trunk-grad)" />
  <path d="M 115 220 C 120 235 140 245 160 240 C 135 240 125 230 115 220" fill="url(#trunk-grad)" />
  <path d="M 100 220 C 95 240 100 245 105 245 C 105 240 110 235 100 220" fill="url(#trunk-grad)" />
  
  <!-- Main Trunk (intertwined) -->
  <path d="M 85 220 C 85 170 95 150 90 120 C 85 100 80 90 70 80 C 85 95 95 105 100 120 C 105 150 95 170 100 220 Z" fill="url(#trunk-grad)" />
  <path d="M 115 220 C 115 170 105 150 110 120 C 115 100 120 90 130 80 C 115 95 105 105 100 120 C 95 150 105 170 100 220 Z" fill="url(#trunk-grad)" />

  <!-- Inner Branches -->
  <path d="M 95 120 C 85 100 70 90 50 85" fill="none" stroke="url(#trunk-grad)" stroke-width="6" stroke-linecap="round" />
  <path d="M 105 120 C 115 100 130 90 150 85" fill="none" stroke="url(#trunk-grad)" stroke-width="6" stroke-linecap="round" />
  <path d="M 100 110 C 100 80 110 60 120 40" fill="none" stroke="url(#trunk-grad)" stroke-width="5" stroke-linecap="round" />
  <path d="M 100 110 C 90 80 80 60 70 50" fill="none" stroke="url(#trunk-grad)" stroke-width="4" stroke-linecap="round" />

  <!-- Leaves clusters (Golden Tree) -->
  <!-- Top Center -->
  <circle cx="100" cy="50" r="35" fill="url(#leaves-grad)" filter="url(#glow)" opacity="0.9" />
  <circle cx="115" cy="40" r="25" fill="url(#leaves-grad)" filter="url(#glow)" />
  <circle cx="85" cy="45" r="28" fill="url(#leaves-grad)" filter="url(#glow)" />
  
  <!-- Left side -->
  <circle cx="60" cy="80" r="30" fill="url(#leaves-grad)" filter="url(#glow)" opacity="0.9" />
  <circle cx="45" cy="95" r="20" fill="url(#leaves-grad)" filter="url(#glow)" />
  <circle cx="70" cy="65" r="25" fill="url(#leaves-grad)" filter="url(#glow)" />

  <!-- Right side -->
  <circle cx="140" cy="75" r="30" fill="url(#leaves-grad)" filter="url(#glow)" opacity="0.9" />
  <circle cx="155" cy="95" r="22" fill="url(#leaves-grad)" filter="url(#glow)" />
  <circle cx="125" cy="60" r="25" fill="url(#leaves-grad)" filter="url(#glow)" />
  
  <!-- Central Fill -->
  <circle cx="100" cy="85" r="40" fill="url(#leaves-grad)" filter="url(#glow)" opacity="0.95" />

  <!-- Falling leaves / sparks -->
  <circle cx="50" cy="140" r="2" fill="#fef08a" filter="url(#glow)" />
  <circle cx="65" cy="180" r="1.5" fill="#fde047" filter="url(#glow)" />
  <circle cx="140" cy="150" r="2.5" fill="#fef08a" filter="url(#glow)" />
  <circle cx="160" cy="190" r="1.5" fill="#fef08a" filter="url(#glow)" />
  <circle cx="120" cy="175" r="2" fill="#fde047" filter="url(#glow)" />
  <circle cx="80" cy="160" r="3" fill="#fef08a" filter="url(#glow)" />
  
</svg>
