<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveBase" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0c4a6e" stop-opacity="1"/>
      <stop offset="50%" stop-color="#0284c7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="foam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#f0f9ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Back wave -->
  <path d="M 0 80 Q 100 40 200 80 T 400 80 L 400 200 L 0 200 Z" fill="url(#waveBase)" opacity="0.6"/>
  <!-- Front wave -->
  <path d="M 0 110 Q 100 50 200 110 T 400 110 L 400 200 L 0 200 Z" fill="url(#waveBase)"/>
  <!-- Foam overlay -->
  <path d="M 0 105 Q 100 45 200 105 T 400 105 L 400 160 Q 300 110 200 160 T 0 160 Z" fill="url(#foam)"/>
</svg>
