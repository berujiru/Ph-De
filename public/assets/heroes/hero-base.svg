<svg xmlns="http://www.w3.org/2000/svg" width="96" height="128" viewBox="0 0 96 128">
  <!--
    In-game hero base model: everyday-Filipino protester marching right,
    megaphone raised, placard on the shoulder. Cel-shaded cut-out per
    docs/ART_AND_AUDIO_GUIDELINES.md - bold silhouette, clean #0f172a outer
    stroke, flat shading. Fills are near-white/gray so Phaser's per-hero
    tint (HeroDefinition.color) colors the whole body.
  -->
  <g stroke="#0f172a" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <!-- placard raised behind the left shoulder -->
    <path d="M22 30 L28 62 L36 60 L30 28 Z" fill="#94a3b8"/>
    <rect x="6" y="8" width="34" height="24" rx="3" fill="#f8fafc"/>

    <!-- back leg (shaded) -->
    <path d="M36 82 L24 110 L36 115 L46 88 Z" fill="#94a3b8"/>
    <path d="M22 108 L36 113 L34 121 L18 118 Z" fill="#94a3b8"/>

    <!-- front leg, striding forward -->
    <path d="M48 84 L60 112 L72 107 L58 82 Z" fill="#e2e8f0"/>
    <path d="M60 110 L74 105 L78 114 L62 119 Z" fill="#e2e8f0"/>

    <!-- torso -->
    <path d="M32 48 Q28 78 36 88 L58 88 Q66 76 62 50 Q46 42 32 48 Z" fill="#e2e8f0"/>
    <!-- flat shade panel on the torso's far side -->
    <path d="M54 50 Q58 70 54 88 L58 88 Q66 76 62 50 Z" fill="#94a3b8" stroke="none"/>

    <!-- raised right arm -->
    <path d="M52 56 L70 32 L79 39 L62 62 Z" fill="#e2e8f0"/>
    <!-- megaphone pointing up-right -->
    <path d="M70 30 L88 16 L92 36 L76 42 Z" fill="#94a3b8"/>
    <rect x="66" y="28" width="9" height="12" rx="3" fill="#e2e8f0"/>

    <!-- head -->
    <circle cx="46" cy="28" r="13" fill="#e2e8f0"/>
    <!-- cap: crown + brim toward the march direction -->
    <path d="M33 26 A13 13 0 0 1 59 26 Z" fill="#94a3b8"/>
    <rect x="46" y="20" width="17" height="6" rx="3" fill="#94a3b8"/>
    <!-- bandana knot at the neck -->
    <path d="M38 42 Q46 48 56 42 L54 52 Q46 56 40 52 Z" fill="#cbd5e1"/>
  </g>
</svg>
