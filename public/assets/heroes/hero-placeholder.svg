<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Hero portrait placeholder: clean head-and-shoulders bust silhouette. -->

  <defs>
    <!-- Subtle vertical gradient for depth -->
    <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="head-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="70%" stop-color="#334155"/>
    </linearGradient>
    <!-- Rim-light accent -->
    <linearGradient id="rim" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shoulders / torso — smooth curve, fades into bottom -->
  <path
    d="M56 512 v-40 q0-100 90-130 l56-18 q54-14 108 0 l56 18 q90 30 90 130 v40 z"
    fill="url(#body-grad)"
  />

  <!-- Collar / neckline detail -->
  <path
    d="M218 330 q38 22 76 0 l-8 24 q-30 14-60 0 z"
    fill="#1e293b"
  />

  <!-- Neck -->
  <rect x="232" y="252" width="48" height="64" rx="14" fill="url(#body-grad)"/>

  <!-- Head -->
  <ellipse cx="256" cy="186" rx="72" ry="78" fill="url(#head-grad)"/>

  <!-- Hair / top of head — subtle cap shape -->
  <path
    d="M184 178 a72 78 0 0 1 144 0 q-4-44-72-54 q-68 10-72 54 z"
    fill="#1e293b"
  />

  <!-- Ears -->
  <ellipse cx="184" cy="200" rx="10" ry="14" fill="#334155"/>
  <ellipse cx="328" cy="200" rx="10" ry="14" fill="#334155"/>

  <!-- Subtle face features — very minimal, just enough to read as a face -->
  <!-- Eye line hint -->
  <g opacity="0.15">
    <ellipse cx="232" cy="182" rx="10" ry="4" fill="#0f172a"/>
    <ellipse cx="280" cy="182" rx="10" ry="4" fill="#0f172a"/>
  </g>

  <!-- Accent rim light — right side -->
  <g fill="none" stroke="url(#rim)" stroke-width="6" stroke-linecap="round">
    <!-- Head rim -->
    <path d="M310 130 a72 78 0 0 1 18 68"/>
    <!-- Shoulder rim -->
    <path d="M366 340 q72 28 76 108"/>
  </g>
</svg>
