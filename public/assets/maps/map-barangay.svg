<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" preserveAspectRatio="xMidYMid slice">
  <!-- Act 1: Barangay — street, basketball court, houses, barangay hall -->
  <rect width="540" height="960" fill="#0f172a"/>

  <!-- stars -->
  <g fill="#f8fafc" opacity="0.25">
    <circle cx="60" cy="50" r="1.5"/><circle cx="150" cy="90" r="1"/><circle cx="330" cy="40" r="1.2"/>
    <circle cx="440" cy="80" r="1.5"/><circle cx="500" cy="140" r="1"/><circle cx="230" cy="70" r="1"/>
  </g>

  <!-- barangay hall silhouette (top center) -->
  <g fill="#0b1120">
    <rect x="170" y="120" width="200" height="110"/>
    <path d="M160 120 270 70 380 120z"/>
    <rect x="190" y="150" width="20" height="80"/>
    <rect x="230" y="150" width="20" height="80"/>
    <rect x="290" y="150" width="20" height="80"/>
    <rect x="330" y="150" width="20" height="80"/>
    <rect x="266" y="30" width="4" height="45"/>
  </g>
  <path d="M270 34l16 6-16 6z" fill="#38bdf8" opacity="0.5"/>
  <rect x="255" y="170" width="30" height="60" fill="#facc15" opacity="0.18"/>

  <!-- left house row -->
  <g fill="#0b1120">
    <rect x="0" y="300" width="150" height="120"/>
    <path d="M-10 300 75 250l85 50z"/>
    <rect x="0" y="500" width="130" height="140"/>
    <path d="M-10 500 65 455l75 45z"/>
    <rect x="0" y="720" width="155" height="150"/>
    <path d="M-10 720 78 668l87 52z"/>
  </g>
  <!-- right house row -->
  <g fill="#0b1120">
    <rect x="395" y="330" width="145" height="130"/>
    <path d="M385 330l83-52 82 52z"/>
    <rect x="410" y="560" width="130" height="140"/>
    <path d="M400 560l75-45 75 45z"/>
    <rect x="390" y="770" width="150" height="130"/>
    <path d="M380 770l85-50 85 50z"/>
  </g>
  <!-- warm windows -->
  <g fill="#facc15" opacity="0.22">
    <rect x="30" y="330" width="22" height="26"/><rect x="90" y="330" width="22" height="26"/>
    <rect x="25" y="540" width="20" height="24"/><rect x="75" y="540" width="20" height="24"/>
    <rect x="40" y="760" width="22" height="26"/><rect x="100" y="760" width="22" height="26"/>
    <rect x="425" y="365" width="22" height="26"/><rect x="485" y="365" width="22" height="26"/>
    <rect x="440" y="595" width="20" height="24"/><rect x="490" y="595" width="20" height="24"/>
    <rect x="420" y="800" width="22" height="26"/><rect x="480" y="800" width="22" height="26"/>
  </g>

  <!-- central street (rally lane, bottom → top) -->
  <rect x="190" y="230" width="160" height="730" fill="#131c31"/>
  <rect x="190" y="230" width="6" height="730" fill="#1e293b"/>
  <rect x="344" y="230" width="6" height="730" fill="#1e293b"/>
  <g stroke="#94a3b8" stroke-width="4" opacity="0.16">
    <path d="M270 250v40M270 330v40M270 410v40M270 490v40M270 570v40M270 650v40M270 730v40M270 810v40M270 890v40"/>
  </g>

  <!-- basketball half-court painted on the street -->
  <g stroke="#38bdf8" fill="none" opacity="0.2" stroke-width="3">
    <circle cx="270" cy="620" r="42"/>
    <path d="M198 700a72 60 0 0 1 144 0"/>
    <path d="M198 700h144"/>
  </g>
  <!-- hoop pole (right of court) -->
  <g fill="#0b1120">
    <rect x="356" y="560" width="8" height="130"/>
    <rect x="336" y="548" width="48" height="34" rx="2"/>
  </g>
  <rect x="352" y="556" width="16" height="14" fill="none" stroke="#1e293b" stroke-width="3"/>

  <!-- hanging wires + streetlamp -->
  <path d="M0 270q135 40 270 20t270-30" stroke="#0b1120" stroke-width="3" fill="none"/>
  <path d="M0 300q160 30 320 12" stroke="#0b1120" stroke-width="2" fill="none" opacity="0.8"/>
  <g>
    <rect x="176" y="380" width="6" height="120" fill="#0b1120"/>
    <path d="M179 380h28" stroke="#0b1120" stroke-width="6"/>
    <circle cx="207" cy="388" r="16" fill="#facc15" opacity="0.14"/>
    <circle cx="207" cy="386" r="5" fill="#facc15" opacity="0.5"/>
  </g>
</svg>
