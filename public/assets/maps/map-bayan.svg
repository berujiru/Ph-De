<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" preserveAspectRatio="xMidYMid slice">
  <!-- Act 2: Bayan / LGU — public market, transport terminal, jeepneys -->
  <rect width="540" height="960" fill="#0f172a"/>

  <!-- stars -->
  <g fill="#f8fafc" opacity="0.2">
    <circle cx="90" cy="40" r="1.2"/><circle cx="260" cy="30" r="1"/><circle cx="430" cy="55" r="1.4"/>
  </g>

  <!-- terminal / market canopy (top): sawtooth roof -->
  <g fill="#0b1120">
    <path d="M60 190h420v40H60z"/>
    <path d="M60 190v-50l70 15v35zM200 190v-50l70 15v35zM340 190v-50l70 15v35z"/>
    <rect x="80" y="230" width="12" height="90"/>
    <rect x="250" y="230" width="12" height="90"/>
    <rect x="450" y="230" width="12" height="90"/>
  </g>
  <rect x="110" y="240" width="120" height="50" fill="#facc15" opacity="0.10"/>
  <rect x="300" y="240" width="130" height="50" fill="#facc15" opacity="0.10"/>

  <!-- central road -->
  <rect x="185" y="230" width="170" height="730" fill="#131c31"/>
  <rect x="185" y="230" width="6" height="730" fill="#1e293b"/>
  <rect x="349" y="230" width="6" height="730" fill="#1e293b"/>
  <g stroke="#94a3b8" stroke-width="4" opacity="0.15">
    <path d="M270 260v42M270 344v42M270 428v42M270 512v42M270 596v42M270 680v42M270 764v42M270 848v42"/>
  </g>

  <!-- market stalls (left) with awnings -->
  <g fill="#0b1120">
    <rect x="10" y="380" width="140" height="90"/>
    <rect x="10" y="560" width="140" height="90"/>
    <rect x="10" y="740" width="140" height="90"/>
  </g>
  <g fill="#16213a">
    <path d="M0 380h160l-14 26H14zM0 560h160l-14 26H14zM0 740h160l-14 26H14z"/>
  </g>
  <g fill="#facc15" opacity="0.16">
    <rect x="35" y="420" width="30" height="30"/><rect x="90" y="420" width="30" height="30"/>
    <rect x="35" y="600" width="30" height="30"/><rect x="90" y="600" width="30" height="30"/>
    <rect x="35" y="780" width="30" height="30"/><rect x="90" y="780" width="30" height="30"/>
  </g>

  <!-- market stalls (right) -->
  <g fill="#0b1120">
    <rect x="390" y="470" width="140" height="90"/>
    <rect x="390" y="650" width="140" height="90"/>
  </g>
  <g fill="#16213a">
    <path d="M380 470h160l-14 26H394zM380 650h160l-14 26H394z"/>
  </g>
  <g fill="#facc15" opacity="0.16">
    <rect x="415" y="510" width="30" height="30"/><rect x="470" y="510" width="30" height="30"/>
    <rect x="415" y="690" width="30" height="30"/><rect x="470" y="690" width="30" height="30"/>
  </g>

  <!-- parked jeepneys along the road edges -->
  <g fill="#0b1120">
    <path d="M120 880h100a10 10 0 0 1 10 10v34H110v-34a10 10 0 0 1 10-10z"/>
    <circle cx="140" cy="928" r="11"/><circle cx="210" cy="928" r="11"/>
    <path d="M330 330h95a10 10 0 0 1 10 10v30H320v-30a10 10 0 0 1 10-10z"/>
    <circle cx="350" cy="372" r="10"/><circle cx="412" cy="372" r="10"/>
  </g>
  <g fill="#38bdf8" opacity="0.25">
    <rect x="128" y="890" width="18" height="14" rx="2"/><rect x="156" y="890" width="18" height="14" rx="2"/>
    <rect x="184" y="890" width="18" height="14" rx="2"/>
    <rect x="338" y="338" width="16" height="12" rx="2"/><rect x="364" y="338" width="16" height="12" rx="2"/>
    <rect x="390" y="338" width="16" height="12" rx="2"/>
  </g>

  <!-- banderitas (string flags) across the road -->
  <path d="M0 320q270 60 540 0" stroke="#0b1120" stroke-width="2.5" fill="none"/>
  <g fill="#38bdf8" opacity="0.35">
    <path d="M60 333l7 14 7-12zM140 345l7 14 7-12zM220 351l7 14 7-12zM300 351l7 14 7-12zM380 345l7 14 7-12zM460 333l7 14 7-12z"/>
  </g>
  <path d="M0 430q270 55 540 10" stroke="#0b1120" stroke-width="2" fill="none" opacity="0.8"/>
  <g fill="#facc15" opacity="0.25">
    <circle cx="110" cy="452" r="4"/><circle cx="215" cy="464" r="4"/><circle cx="330" cy="466" r="4"/><circle cx="440" cy="452" r="4"/>
  </g>
